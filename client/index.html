<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GLOW — Gunung Kidul Location for Work</title>
  <script>
    window.onerror = function(msg, url, line, col, error) {
      fetch('http://localhost:3001/api/log', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ error: msg, line: line, col: col, stack: error ? error.stack : '' })
      }).catch(e=>{});
    };
    window.addEventListener('unhandledrejection', function(event) {
      fetch('http://localhost:3001/api/log', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ error: 'Unhandled promise rejection', reason: event.reason })
      }).catch(e=>{});
    });
  </script>
  <meta name="description" content="Temukan workation spot sempurna di Gunung Kidul. Hotel, cafe, wisata, kuliner — semua dalam satu platform." />
  <link rel="icon" type="image/png" href="assets/images/logo.png?v=new" />
